<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TLDR mascot">
  <title>TLDR — owl, scroll, scissors, verdict</title>
  <rect width="512" height="512" fill="#f7f4ed"/>
  <!-- scroll spiral -->
  <path d="M380 80 Q420 200 360 320 Q300 420 180 400 Q80 380 100 260 Q120 140 240 120 Q320 108 380 80 Z" fill="#faf8f2" stroke="#5c4a3a" stroke-width="6"/>
  <g stroke="#b8b4ac" stroke-width="4" stroke-linecap="round">
    <line x1="300" y1="160" x2="340" y2="160"/><line x1="300" y1="180" x2="330" y2="180"/>
    <line x1="280" y1="220" x2="350" y2="220"/><line x1="260" y1="250" x2="320" y2="250"/>
    <line x1="200" y1="300" x2="280" y2="300"/><line x1="180" y1="330" x2="250" y2="330"/>
  </g>
  <!-- owl body -->
  <ellipse cx="248" cy="268" rx="88" ry="96" fill="#8b5e3c" stroke="#4a3528" stroke-width="5"/>
  <ellipse cx="248" cy="280" rx="58" ry="62" fill="#f3ead8"/>
  <!-- eyes + glasses -->
  <ellipse cx="220" cy="248" rx="22" ry="14" fill="#fff" stroke="#222" stroke-width="3"/>
  <ellipse cx="276" cy="248" rx="22" ry="14" fill="#fff" stroke="#222" stroke-width="3"/>
  <line x1="198" y1="248" x2="298" y2="248" stroke="#222" stroke-width="5"/>
  <ellipse cx="220" cy="250" rx="8" ry="10" fill="#2a2118"/>
  <ellipse cx="276" cy="250" rx="8" ry="10" fill="#2a2118"/>
  <path d="M238 268 L248 278 L258 268" fill="#4a3528"/>
  <!-- scissors -->
  <g transform="translate(300,300) rotate(-20)">
    <circle cx="0" cy="0" r="10" fill="#9aa3ad" stroke="#555" stroke-width="2"/>
    <path d="M-8 -20 L-30 -55 M8 -20 L25 -50" stroke="#888" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- sticky -->
  <rect x="330" y="200" width="120" height="100" rx="4" fill="#ffd84d" stroke="#c9a227" stroke-width="3"/>
  <text x="350" y="238" font-family="ui-rounded, system-ui, sans-serif" font-size="22" font-weight="700" fill="#222">TL;DR</text>
  <text x="342" y="268" font-family="ui-rounded, system-ui, sans-serif" font-size="14" fill="#333">Verdict first.</text>
</svg>