name: Sync skill mirrors

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "agents/tldrcrew-*.md"
      - "commands/**"
      - ".github/workflows/sync-skill.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Sync Claude plugin mirrors and dist zip
        run: |
          set -euo pipefail
          mkdir -p plugins/tldr/agents dist
          for s in tldr tldr-compress tldrcrew tldr-commit tldr-review tldr-stats tldr-help tldr-update; do
            mkdir -p "plugins/tldr/skills/$s"
            rsync -a --delete "skills/$s/" "plugins/tldr/skills/$s/"
          done
          cp agents/tldrcrew-*.md plugins/tldr/agents/
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile, ZipInfo, ZIP_DEFLATED
          root = Path('skills/tldr')
          out = Path('dist/tldr.skill')
          # Deterministic (fixed mtime): identical inputs -> identical bytes, so
          # the sync job stops pushing no-op "Bin 2912 -> 2912 bytes" commits.
          with ZipFile(out, 'w', ZIP_DEFLATED) as z:
              for p in sorted(root.rglob('*')):
                  if p.is_file():
                      zi = ZipInfo(str(Path('tldr') / p.relative_to(root)), date_time=(1980, 1, 1, 0, 0, 0))
                      zi.external_attr = 0o644 << 16
                      z.writestr(zi, p.read_bytes())
          PY
          python3 tests/verify_repo.py
      - name: Commit synced artifacts
        run: |
          if git diff --quiet; then
            echo "No sync changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/tldr/skills plugins/tldr/agents dist/tldr.skill
          git commit -m "chore: sync skill mirrors [skip ci]"
          git push
