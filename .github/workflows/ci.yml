name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Python gates
        run: |
          python3 tests/verify_repo.py
          python3 bench/check-doc-sync.py
          python3 bench/check-md-links.py
          python3 tests/test_compress_safety.py
          python3 tests/test_hooks.py
          python3 tests/test_validate_inline.py
          python3 tests/test_detect.py
          python3 tests/test_mode_tracker.py
      - name: Installer tests
        run: node --test tests/installer/*.test.mjs
      - name: Standalone JS tests
        run: |
          node tests/test_mcp_shrink.js
          node tests/test_symlink_flag.js
          node tests/test_repo_local_config.js
          node tests/test_tldr_init.js
          node tests/test_tldr_stats.js
          node tests/test_tldrcrew_model_overrides.js
          node tests/test_mode_tracker_stdin.js
      - name: HTML asset links
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html = Path('docs/index.html').read_text()
          refs = re.findall(r'''(?:href|src)=["']([^"']+)["']''', html)
          missing = []
          for ref in refs:
              if ref.startswith(('http://', 'https://', '#', 'mailto:')):
                  continue
              path = Path('docs') / ref.split('#', 1)[0].split('?', 1)[0]
              if ref and not path.exists():
                  missing.append((ref, str(path)))
          if missing:
              for ref, path in missing:
                  print(f'missing docs asset: {ref} -> {path}')
              raise SystemExit(1)
          print(f'checked {len(refs)} HTML href/src refs')
          PY
      - name: npm package hygiene
        run: |
          npm pack --dry-run --json > /tmp/tldr-pack.json
          python3 - <<'PY'
          import json
          pack = json.load(open('/tmp/tldr-pack.json'))[0]
          bad = [f['path'] for f in pack['files'] if '__pycache__' in f['path'] or f['path'].endswith('.pyc')]
          if bad:
              print('\n'.join(bad))
              raise SystemExit('npm pack contains Python bytecode')
          print(f"npm pack files: {len(pack['files'])}")
          PY
      - name: Secret pattern smoke scan
        run: |
          if git grep -n -E '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{20,})' -- ':!data/**' ':!*.png' ':!*.jpg' ':!*.ico'; then
            echo 'Potential secret pattern found.' >&2
            exit 1
          fi
