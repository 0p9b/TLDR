description = "Drop the always-on TLDR activation rule (AGENTS.md etc.) into the current repo for every IDE agent"
prompt = "Write the per-repo TLDR rule files into the current repo and report the result. If `src/tools/tldr-init.js` exists in the current repo (a TLDR checkout), run `node src/tools/tldr-init.js {{args}}`. Otherwise run the standalone script (self-contained, supports stdin execution): `curl -fsSL https://raw.githubusercontent.com/0point9bar/TLDR/main/src/tools/tldr-init.js | node - {{args}}`. Use --dry-run first if the user did not pass --force, so we never silently overwrite an existing rule file. The rules written carry the canonical TLDR ruleset: verdict first, no filler, shape dispatch."
